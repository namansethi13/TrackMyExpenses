services:
  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    ports:
      - "5173:5173"
    entrypoint: ["./entrypoint.sh"]
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    ports:
      - "8000:8000"
    entrypoint: ["sh", "-c", "uvicorn main:app --host 0.0.0.0 --reload"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis

  # Runs dev-only startup scripts (ngrok tunnel, etc).
  # To add a new startup concern: edit backend/scripts/dev/start.sh.
  startup-scripts:
    build:
      context: ./backend
      dockerfile: DockerFile
    entrypoint: ["sh", "-c", "sed -i 's/\\r//' scripts/dev/start.sh && sh scripts/dev/start.sh"]
    env_file:
      - ./backend/.env
    environment:
      - BACKEND_HOST=backend
    volumes:
      - ./backend:/app
    depends_on:
      - backend
    restart: on-failure

  celery:
    build:
      context: ./backend
      dockerfile: DockerFile
    entrypoint: ["sh", "-c", "celery -A cel.app.celery_app worker -l info"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: DockerFile
    entrypoint: ["sh", "-c", "celery -A cel.app.celery_app beat -l info"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"


volumes:
  mongo-data:
